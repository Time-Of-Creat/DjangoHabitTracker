{% extends 'Habit/base.html' %}

{% block title %}Список привычек{% endblock %}

{% block content %}
    <h1>Список привычек</h1>
    <ul>
        {% for habit in habits %}
            <li>
                <span>
                    {{ habit.title }} 🔥 {{ habit.streak }}
                </span>
            </li>
        {% empty %}
            <li>Пока нет привычек. Создай первую!</li>
        {% endfor %}
    </ul>
    
{% endblock %}
