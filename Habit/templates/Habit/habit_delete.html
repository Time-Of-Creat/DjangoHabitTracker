{% extends 'Habit/base.html' %}

{% block title %}Удаление привычки{% endblock %}

{% block content %}
    <h1>Удаление привычки</h1>

    <p>Вы уверены, что хотите удалить привычку "{{ object.title }}"?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Да, удалить</button>
        <a href="{% url 'habits_list' %}">Отмена</a>
    </form>
{% endblock %}
